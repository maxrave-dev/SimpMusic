name: Build desktop macOS .zip package (Conveyor)

# Note: Conveyor 2.0 deprecated .dmg in favour of signed .zip bundles
# (`unnotarized-mac-zip` task). Filename kept for git history continuity.

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev'
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: write

jobs:
  build-mac-zip-aarch64:
    name: Build desktop macOS .zip (Apple Silicon)
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "microsoft"
          cache: 'gradle'

      - name: Update build product flavor
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=true" >> ./gradle.properties

      - name: Update Sentry Secrets
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_JVM }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          echo 'SENTRY_DSN=${{ secrets.SENTRY_DSN_JVM }}' > ./local.properties
          echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> ./local.properties

      - name: Generate aboutLibraries.json
        run: ./gradlew exportLibraryDefinitions

      - name: Populate vlc-natives via vlcSetup
        run: ./gradlew :composeApp:vlcSetup --no-configuration-cache

      - name: Download Conveyor (mac aarch64)
        shell: bash
        run: |
          wget -q https://downloads.hydraulic.dev/conveyor/conveyor-22.0-mac-aarch64.zip
          unzip -q conveyor-22.0-mac-aarch64.zip

      - name: Run Conveyor (make unnotarized-mac-zip, aarch64)
        shell: bash
        env:
          CONVEYOR_AGREE_TO_LICENSE: 1
        run: |
          export PATH="$PWD/Conveyor.app/Contents/MacOS:$PATH"
          conveyor \
            "-Kapp.signing-key=${{ secrets.CONVEYOR_SIGNING_KEY }}" \
            -Kapp.machines=mac.aarch64 \
            make unnotarized-mac-zip

      - name: Upload macOS .zip package
        uses: actions/upload-artifact@v4
        with:
          name: desktop-mac-zip-aarch64
          path: output/*.zip

  build-mac-zip-amd64:
    name: Build desktop macOS .zip (Intel)
    runs-on: macos-26-intel
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "microsoft"
          cache: 'gradle'

      - name: Update build product flavor
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=true" >> ./gradle.properties

      - name: Update Sentry Secrets
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_JVM }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          echo 'SENTRY_DSN=${{ secrets.SENTRY_DSN_JVM }}' > ./local.properties
          echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> ./local.properties

      - name: Generate aboutLibraries.json
        run: ./gradlew exportLibraryDefinitions

      - name: Populate vlc-natives via vlcSetup
        run: ./gradlew :composeApp:vlcSetup --no-configuration-cache

      - name: Download Conveyor (mac amd64)
        shell: bash
        run: |
          wget -q https://downloads.hydraulic.dev/conveyor/conveyor-22.0-mac-amd64.zip
          unzip -q conveyor-22.0-mac-amd64.zip

      - name: Run Conveyor (make unnotarized-mac-zip, amd64)
        shell: bash
        env:
          CONVEYOR_AGREE_TO_LICENSE: 1
        run: |
          export PATH="$PWD/Conveyor.app/Contents/MacOS:$PATH"
          conveyor \
            "-Kapp.signing-key=${{ secrets.CONVEYOR_SIGNING_KEY }}" \
            -Kapp.machines=mac.amd64 \
            make unnotarized-mac-zip

      - name: Upload macOS .zip package
        uses: actions/upload-artifact@v4
        with:
          name: desktop-mac-zip-amd64
          path: output/*.zip
