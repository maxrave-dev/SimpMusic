name: Build desktop AppImage package (Conveyor)

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev'
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: write

jobs:
  build-desktop-appimage:
    name: Build desktop AppImage package
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "microsoft"
          cache: 'gradle'

      - name: Install libfuse2 (AppImage runtime)
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Update build product flavor
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=true" >> ./gradle.properties

      - name: Update Sentry Secrets
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_JVM }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          echo 'SENTRY_DSN=${{ secrets.SENTRY_DSN_JVM }}' > ./local.properties
          echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> ./local.properties

      - name: Generate aboutLibraries.json
        run: ./gradlew exportLibraryDefinitions

      - name: Populate vlc-natives via vlcSetup
        run: ./gradlew :composeApp:vlcSetup --no-configuration-cache

      - name: Run Conveyor (make linux-app)
        uses: hydraulic-software/conveyor/actions/build@v22.0
        with:
          command: -Kapp.machines=linux.amd64.glibc make linux-app
          agree_to_license: 1
          signing_key: ${{ secrets.CONVEYOR_SIGNING_KEY }}

      - name: Wrap output/ → SimpMusic-x86_64.AppImage
        run: ./gradlew :desktopApp:packageConveyorAppImage --no-configuration-cache

      - name: Upload AppImage package
        uses: actions/upload-artifact@v4
        with:
          name: desktop-appimage-package
          path: desktopApp/build/appimage/conveyor/SimpMusic-x86_64.AppImage
