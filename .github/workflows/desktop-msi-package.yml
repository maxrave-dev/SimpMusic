name: Build desktop Windows .msix package (Conveyor)

# Note: Conveyor 2.0 ships .msix (modern Windows app package) instead of
# the legacy .msi. Filename kept for git history continuity.

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev'
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: write

jobs:
  build-desktop-msix:
    name: Build desktop Windows .msix package
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "microsoft"
          cache: 'gradle'

      - name: Update build product flavor
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=true" >> ./gradle.properties

      - name: Update Sentry Secrets
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_JVM }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          echo 'SENTRY_DSN=${{ secrets.SENTRY_DSN_JVM }}' > ./local.properties
          echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> ./local.properties

      - name: Generate aboutLibraries.json
        run: ./gradlew exportLibraryDefinitions

      - name: Populate vlc-natives via vlcSetup
        run: ./gradlew :composeApp:vlcSetup --no-configuration-cache

      - name: Run Conveyor (make windows-msix)
        uses: hydraulic-software/conveyor/actions/build@v22.0
        with:
          command: -Kapp.machines=windows.amd64 make windows-msix
          agree_to_license: 1
          signing_key: ${{ secrets.CONVEYOR_SIGNING_KEY }}

      - name: Upload .msix package
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-msix
          path: output/*.msix
