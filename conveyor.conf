// SimpMusic — Hydraulic Conveyor packaging config (Conveyor 2.0+)
//
// Distribution: installers (Mac .dmg via Mac runner wrap, Windows .msix
// + .appinstaller + .exe wrapper, Linux .AppImage) are uploaded to
// GitHub Releases manually. Conveyor's site.base-url auto-resolves to
// the `releases/latest/download/` URL pattern via `app.vcs-url`, so
// the generated download.html / `.appinstaller` reference the correct
// asset URLs without any extra hosting. Auto-update is disabled (see
// `updates = none` below) — users re-download for new versions.
//
// Pattern adapted from https://github.com/zacharee/Bifrost (KMP +
// Conveyor 2.0 reference).

// CI / local must run `./gradlew :desktopApp:writeConveyorConfig` BEFORE
// invoking Conveyor. The shell-include form (`include "#!..."`) was
// removed because Conveyor parses Gradle stdout as HOCON, and Sentry-
// related `println("Full build detected, ...")` in composeApp+androidApp
// configuration phase corrupts that stdout when `isFullBuild=true` is
// set in CI → "Key 'Full build detected' may not be followed by ','".
include required("desktopApp/generated.conveyor.conf")

// NOTE: deliberately NOT including hydraulic's extract-native-libraries.conf.
// That helper extracts every JAR-embedded native into the top-level lib/app
// AND keeps the source tree intact — duplicating our 348 MB VLC plugin set
// (output ballooned from 989 MB to 1.4 GB). VLCJ + JNA load fine because:
//   1. DefaultVlcDiscoverer walks up from the JAR to find vlc/ at runtime
//   2. JNA's own per-JAR native unpacking still runs without the helper

app {
  // fsname / display-name / rdns-name are appended by the doLast block in
  // desktopApp/build.gradle.kts's writeConveyorConfig customisation.

  vendor      = "maxrave-dev"
  description = "A FOSS YouTube Music client built with Compose Multiplatform."
  license     = "GPL-3.0-or-later"

  // Open source = free Conveyor. Setting `vcs-url` to the public source
  // repository qualifies SimpMusic for the OSS tier and removes the paid
  // license requirement. See https://hydraulic.dev/pricing.html — "free
  // for open source projects if you set the app.vcs-url key to where your
  // source repository can be found."
  //
  // Per the same clause we must advertise "Packaged with Conveyor" + link
  // to hydraulic.dev somewhere user-visible (download page, README, or
  // about screen). The auto-generated download site already embeds the
  // required badge — see TODO in docs/conveyor-local-test.md.
  vcs-url = "https://github.com/maxrave-dev/SimpMusic"

  // Single PNG source → Conveyor auto-derives .icns / .ico / png variants
  // for mac, windows, linux. Native .icns / .ico inputs are silently
  // ignored by Conveyor 22.0 (it always re-encodes from raster source).
  icons = "composeApp/icon/circle_app_icon.png"

  // site.base-url auto-inferred from `vcs-url` above to the latest GitHub
  // Release for this repo (Conveyor 22.0+ behaviour, per the March 2024
  // blog update). Manually setting it to the releases LIST page broke
  // the .appinstaller / .exe wrapper URLs Conveyor generates.
  //
  // updates = none → Conveyor does not wire Sparkle (Mac) or the
  // background .appinstaller update check (Windows). Releases are still
  // shipped through GitHub Releases manually; users re-download to
  // upgrade. Flip to `background` later if/when we want silent updates.
  updates = none

  site {
    consistency-checks = warn
  }

  // Explicit machines list. Linux ARM64 dropped — VideoLAN does not
  // ship a prebuilt VLC binary for Linux ARM (their stance: "Linux uses
  // distro package manager"), and the mahozad/vlc-plugins-linux Maven
  // artifact we rely on only publishes amd64. Including linux.aarch64
  // here would ship an AppImage that crashes on first VLCJ load.
  machines = [
    "windows.amd64", "windows.aarch64",
    "mac.amd64", "mac.aarch64",
    "linux.amd64.glibc",
  ]

  // Per-arch VLC native libraries staged by
  // `./gradlew :composeApp:vlcSetupAll`. VideoLAN ships separate per-arch
  // binaries for Mac (arm64.dmg vs intel64.dmg) and Windows (win64.zip vs
  // winarm64.zip), so each per-machine installer only carries the slice
  // it actually needs — saves ~25-40 MB per Mac user download vs the
  // pre-split universal layout.
  windows.amd64.inputs   += { from = "vlc-natives/windows-x64",   to = "vlc" }
  windows.aarch64.inputs += { from = "vlc-natives/windows-arm64", to = "vlc" }
  mac.amd64.inputs       += { from = "vlc-natives/macos-x64",     to = "vlc" }
  mac.aarch64.inputs     += { from = "vlc-natives/macos-arm64",   to = "vlc" }
  linux.amd64.inputs     += { from = "vlc-natives/linux-x64",     to = "vlc" }

  // Windows ARM64 JVM input — the Conveyor stdlib JDK preset
  // (/stdlib/jdk/21/openjdk.conf, Eclipse Temurin) does not yet ship a
  // windows.aarch64 build, so `make site` fails with "JAR files were
  // imported but no JVM inputs were supplied for 'windows.aarch64'".
  // Microsoft Build of OpenJDK 21 ships a stable windows-aarch64 zip
  // (matches what CI's setup-java distribution=microsoft already uses
  // for the build-side JDK), redirected through aka.ms so the URL stays
  // pinned across point releases. Other machines keep the Temurin
  // preset for consistency with the local-dev JDK lookup.
  jvm.windows.aarch64.inputs += "https://aka.ms/download-jdk/microsoft-jdk-21-windows-aarch64.zip"

  // --- Per-OS overrides -----------------------------------------------------

  // Linux: produce the relocatable directory tree (`linux-app` task) only.
  // Conveyor 2.0 dropped native AppImage support — we wrap the tree with
  // appimagetool via `./gradlew :desktopApp:packageConveyorAppImage` to
  // ship a one-for-all-distros .AppImage. Set `targets = []` so the `site`
  // task doesn't try to emit .deb / .tar.gz that we don't ship anyway.
  linux.amd64.targets   = [ ]

  mac {
    info-plist.LSApplicationCategoryType = "public.app-category.music"
    info-plist.UIBackgroundModes         = [ "audio", "fetch", "processing" ]
    url-schemes = [ "simpmusic" ]
  }

  windows {
    start-menu.group = "SimpMusic"
    url-schemes = [ "simpmusic" ]
  }

  linux {
    desktop-file."Comment[en]" = "A FOSS YouTube Music client"
    desktop-file.Categories    = "AudioVideo;Audio;Player;Music;"
    desktop-file.StartupWMClass = "java-lang-Thread"
    url-schemes = [ "simpmusic" ]
  }

  // --- Build settings -------------------------------------------------------

  compression-level = low

  jvm {
    modules = "ALL-MODULE-PATH"
    // extract-native-libraries = true  // disabled: duplicates VLC plugins
    // (348 MB) by extracting them flat alongside keeping the original
    // tree. VLCJ + JNA load fine without this because DefaultVlcDiscoverer
    // walks up from the JAR location to find vlc/ at runtime.
    options += "--add-opens=java.base/java.nio=ALL-UNNAMED"
  }

  jvm.mac.options += "--add-opens=java.desktop/sun.awt=ALL-UNNAMED"
  jvm.mac.options += "--add-opens=java.desktop/sun.lwawt=ALL-UNNAMED"
  jvm.mac.options += "--add-opens=java.desktop/sun.lwawt.macosx=ALL-UNNAMED"
}

conveyor.compatibility-level = 21

// Loosen disk cache requirement (default 5 GB free) — local dev machines
// often have less headroom while caches keep growing. CI runners with
// fresh disks won't be affected.
conveyor.disk-cache.minimum-free-disk-space = 1 GB
