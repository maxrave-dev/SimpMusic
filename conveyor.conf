// SimpMusic — Hydraulic Conveyor packaging config (Conveyor 2.0+)
//
// Mode A: package-only. Installers shipped via GitHub Releases manually,
// no auto-update site hosting.
//
// Pattern adapted from https://github.com/zacharee/Bifrost (KMP +
// Conveyor 2.0 reference).

// Hashbang: invoke Gradle's writeConveyorConfig task on :desktopApp to
// produce desktopApp/build/generated.conveyor.conf, then include it.
include "#!./gradlew -q :desktopApp:writeConveyorConfig"
include required("desktopApp/generated.conveyor.conf")

// Extract native libs from JARs at startup — required by VLCJ/JNA on JVM.
include required("https://raw.githubusercontent.com/hydraulic-software/conveyor/master/configs/jvm/extract-native-libraries.conf")

app {
  // fsname / display-name / rdns-name are appended by the doLast block in
  // desktopApp/build.gradle.kts's writeConveyorConfig customisation.

  vendor      = "maxrave-dev"
  description = "A FOSS YouTube Music client built with Compose Multiplatform."
  license     = "GPL-3.0-or-later"

  // Per-OS native icons in composeApp/icon/.
  icons {
    label   = "SimpMusic"
    mac     = "composeApp/icon/circle_app_icon.icns"
    windows = "composeApp/icon/circle_app_icon.ico"
    linux   = "composeApp/icon/circle_app_icon.png"
  }

  site.base-url = "https://github.com/maxrave-dev/SimpMusic/releases"
  updates = none

  // Explicit machines list. Linux ARM64 + Windows ARM64 included because
  // catalog already declares those compose desktop variants.
  machines = [
    "windows.amd64", "windows.aarch64",
    "mac.amd64", "mac.aarch64",
    "linux.amd64.glibc", "linux.aarch64.glibc",
  ]

  // VLC native libraries staged by `./gradlew :desktopApp:vlcSetup`.
  windows.amd64.inputs   += { from = "vlc-natives/windows", to = "vlc" }
  windows.aarch64.inputs += { from = "vlc-natives/windows", to = "vlc" }
  mac.amd64.inputs       += { from = "vlc-natives/macos",   to = "vlc" }
  mac.aarch64.inputs     += { from = "vlc-natives/macos",   to = "vlc" }
  linux.amd64.inputs     += { from = "vlc-natives/linux",   to = "vlc" }
  linux.aarch64.inputs   += { from = "vlc-natives/linux",   to = "vlc" }

  // --- Per-OS overrides -----------------------------------------------------

  // Linux: AppImage only (matches post-1.0.4 stance — drop deb/rpm).
  linux.amd64.targets   = [ appimage ]
  linux.aarch64.targets = [ appimage ]

  mac {
    info-plist.LSApplicationCategoryType = "public.app-category.music"
    info-plist.UIBackgroundModes         = [ "audio", "fetch", "processing" ]
    url-schemes = [ "simpmusic" ]
  }

  windows {
    start-menu.group = "SimpMusic"
    url-schemes = [ "simpmusic" ]
  }

  linux {
    desktop-file."Comment[en]" = "A FOSS YouTube Music client"
    desktop-file.Categories    = "AudioVideo;Audio;Player;Music;"
    desktop-file.StartupWMClass = "java-lang-Thread"
    url-schemes = [ "simpmusic" ]
  }

  // --- Build settings -------------------------------------------------------

  compression-level = low

  jvm {
    modules = "ALL-MODULE-PATH"
    extract-native-libraries = true
    options += "--add-opens=java.base/java.nio=ALL-UNNAMED"
  }

  jvm.mac.options += "--add-opens=java.desktop/sun.awt=ALL-UNNAMED"
  jvm.mac.options += "--add-opens=java.desktop/sun.lwawt=ALL-UNNAMED"
  jvm.mac.options += "--add-opens=java.desktop/sun.lwawt.macosx=ALL-UNNAMED"
}

conveyor.compatibility-level = 21

// Required by Conveyor 2.0+. Free OSS tier uses this for license tracking.
conveyor.billing-email = "maxrave26@gmail.com"

conveyor.license-key = "jmil-hcfb"
